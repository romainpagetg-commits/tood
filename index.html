<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBF6EF">
<title>TOOD</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF6EF; --surface:#FFFFFF; --surface2:#F3ECE1;
    --text:#232733; --muted:#8D867A; --line:#E9E1D4;
    --accent:#FF6B5A; --accent-press:#F2543F;
    --ambre:#F5B84D; --lavande:#8B93FF; --ok:#4FC59A; --danger:#E5484D;
    --urgent:#F5820D;            /* WARNINGTOOD — urgence, jamais decoratif */
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font:15px/1.45 system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    display:flex; flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .display{font-family:'Poppins',system-ui,sans-serif;}
  ::selection{background:rgba(255,107,90,.2);}
  a{color:var(--accent);} a:hover{color:var(--accent-press);}

  /* ---- Header ---- */
  header{display:flex; align-items:center; gap:10px; padding:16px 14px 10px 16px;}
  header .logo{height:26px; display:block;}
  header .date{color:var(--muted); font-size:12.5px; flex:1; text-transform:capitalize; padding-top:2px;}
  header button{
    width:44px; height:44px; border:none; background:none; color:var(--text);
    font-size:19px; cursor:pointer; border-radius:50%; display:grid; place-items:center;
    transition:background .15s;
  }
  header button:active{background:rgba(35,39,51,.07);}

  /* ---- Liste ---- */
  main{flex:1; overflow-y:auto; padding:2px 14px 162px;}
  .section-label{
    font-family:'Poppins'; font-size:11px; font-weight:600; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--muted); margin:20px 6px 9px;
  }
  .section-label.late{color:var(--danger);}
  .task{
    display:flex; align-items:flex-start; gap:11px;
    background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius); padding:12px 13px; margin-bottom:8px;
    box-shadow:0 1px 2px rgba(35,39,51,.05);
    transition:opacity .28s ease, transform .28s ease;
  }
  .task.done{opacity:0; transform:translateX(34px);}
  .check{
    flex-shrink:0; width:26px; height:26px; margin-top:1px; padding:0;
    border:2px solid #D8CFC0; border-radius:50%; background:var(--surface);
    position:relative; cursor:pointer;
    transition:background .18s, border-color .18s, transform .18s;
  }
  .check::after{
    content:""; position:absolute; left:8px; top:4px;
    width:6px; height:11px; border:solid #fff; border-width:0 2.5px 2.5px 0;
    transform:rotate(45deg) scale(.3); opacity:0;
    transition:opacity .15s, transform .22s cubic-bezier(.34,1.56,.64,1);
  }
  .check:active{border-color:var(--ok); background:var(--ok); transform:scale(.9);}
  .check:active::after{opacity:1; transform:rotate(45deg) scale(1);}
  .task.done .check{border-color:var(--ok); background:var(--ok);}
  .task.done .check::after{opacity:1; transform:rotate(45deg) scale(1);}
  .task.done .task-title{color:var(--muted); text-decoration:line-through;}
  .task-body{flex:1; min-width:0; padding-top:1px;}
  .task-title{font-weight:500; font-size:15.5px; overflow-wrap:break-word;}
  .task-meta{display:flex; align-items:center; gap:7px; margin-top:4px; font-size:12.5px; color:var(--muted); font-weight:500;}
  .dot{width:7px; height:7px; border-radius:50%; flex-shrink:0;}
  .dot.MANUEL{background:#C9C1B2;}
  .dot.PHOTO{background:var(--ambre);}
  .dot.MAIL{background:var(--lavande);}
  .task-note{font-size:12.5px; color:var(--muted); margin-top:3px; overflow-wrap:break-word;}

  /* ---- Urgence (WARNINGTOOD) : ajouter la classe .urgent sur .task cote rendu ---- */
  .task.urgent{border-color:rgba(245,130,13,.4); border-left:4px solid var(--urgent); box-shadow:0 2px 8px rgba(245,130,13,.14);}
  .task.urgent .task-meta{color:#C96A00;}

  /* ---- Etat vide ---- */
  .empty{text-align:center; color:var(--muted); margin-top:64px; font-size:14px; padding:0 32px; line-height:1.5;}
  .empty::before{
    content:""; display:block; width:60px; height:60px; margin:0 auto 16px;
    border-radius:50%; background:rgba(79,197,154,.16);
  }
  .empty .display{font-size:19px; color:var(--text); margin-bottom:6px; font-weight:700;}

  /* ---- Squelette de chargement ---- */
  .sk-label{height:11px; width:92px; border-radius:5px; margin:22px 6px 12px;}
  .sk-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:2px 13px; margin-bottom:8px;}
  .sk-row{display:flex; align-items:center; gap:12px; min-height:56px; border-top:1px solid #F3ECE1;}
  .sk-card .sk-row:first-child{border-top:0;}
  .sk-dot{width:24px; height:24px; border-radius:50%; flex:0 0 24px;}
  .sk-lines{flex:1; display:flex; flex-direction:column; gap:7px;}
  .sk-line{height:11px; border-radius:5px;}
  .sk-label,.sk-dot,.sk-line{background:linear-gradient(100deg,#EFE7DA 40%,#F8F3EA 50%,#EFE7DA 60%); background-size:200% 100%; animation:sk 1.4s linear infinite;}
  @keyframes sk{0%{background-position:140% 0} 100%{background-position:-40% 0}}

  /* ---- Barre de capture ---- */
  .capture{
    position:fixed; bottom:0; left:0; right:0;
    background:linear-gradient(transparent, var(--bg) 26%);
    padding:28px 12px calc(12px + env(safe-area-inset-bottom));
  }
  .chips{display:flex; gap:7px; margin-bottom:9px; overflow-x:auto; scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0; background:var(--surface); color:var(--text);
    border:1.5px solid var(--line); border-radius:999px;
    padding:9px 14px; font-size:13px; font-weight:600; font-family:'Poppins',sans-serif; cursor:pointer;
    white-space:nowrap; transition:background .15s, border-color .15s;
  }
  .chip.on{background:rgba(255,107,90,.12); border-color:rgba(255,107,90,.45); color:var(--accent-press);}
  .bar{
    display:flex; gap:8px; align-items:center;
    background:var(--surface); border:1px solid var(--line);
    border-radius:999px; padding:6px 6px 6px 8px;
    box-shadow:0 10px 30px rgba(35,39,51,.12);
  }
  .bar input[type=text]{flex:1; min-width:0; background:none; border:none; outline:none; color:var(--text); font-size:16px; padding-left:8px;}
  .bar input::placeholder{color:var(--muted);}
  .icon-btn{
    flex-shrink:0; width:44px; height:44px; border-radius:50%;
    border:none; background:var(--surface2); color:var(--text);
    font-size:17px; cursor:pointer; display:grid; place-items:center; transition:background .15s;
  }
  .icon-btn:active{background:#EDE3D3;}
  .icon-btn.send{background:var(--accent); color:#fff; box-shadow:0 4px 12px rgba(255,107,90,.38);}
  .icon-btn.send:active{background:var(--accent-press);}
  .icon-btn:disabled{opacity:.4;}

  /* ---- Modal reglages ---- */
  dialog{background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:var(--radius); padding:22px; width:min(92vw,380px); margin:auto;}
  dialog::backdrop{background:rgba(35,39,51,.45);}
  dialog h2{font-family:'Poppins'; font-size:17px; font-weight:600; margin-bottom:14px;}
  dialog label{display:block; font-size:12px; color:var(--muted); margin:12px 0 4px;}
  dialog input{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:11px; color:var(--text); font-size:14px;}
  dialog input:focus{outline:none; border-color:var(--accent);}
  dialog .save{margin-top:18px; width:100%; padding:13px; background:var(--accent); color:#fff; font-weight:600; border:none; border-radius:10px; font-size:15px; cursor:pointer; font-family:'Poppins';}

  /* ---- Toast ---- */
  #toast{position:fixed; left:50%; bottom:132px; transform:translateX(-50%) translateY(20px); background:var(--text); color:#FBF6EF; padding:11px 18px; border-radius:999px; font-size:13px; opacity:0; pointer-events:none; transition:all .25s; white-space:nowrap; box-shadow:0 8px 24px rgba(35,39,51,.25);}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion:reduce){*{transition:none !important; animation:none !important;}}

  /* ============================================================
     TOOD+ — module additif (écrans détail, semaine, TOODSCORE,
     TOODMAIL, WARNINGTOOD, swipe). N'écrase rien du cœur.
     ============================================================ */
  .t2-navbtn{width:40px;height:40px;border:none;background:none;color:var(--text);border-radius:50%;display:grid;place-items:center;cursor:pointer;position:relative;transition:background .15s;flex:0 0 40px;}
  .t2-navbtn:active{background:rgba(35,39,51,.07);}
  header .date{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .t2-badge{position:absolute;top:4px;right:3px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--lavande);color:#fff;font:700 10px/16px 'Poppins',sans-serif;text-align:center;}

  /* Icônes dessinées */
  .t2-ico{display:block;position:relative;}
  .t2-ico.cal{width:19px;height:19px;}
  .t2-ico.cal i:nth-child(1){position:absolute;top:2px;left:0;width:19px;height:15px;border:2px solid currentColor;border-radius:4px;}
  .t2-ico.cal i:nth-child(2){position:absolute;top:6px;left:0;width:19px;height:2px;background:currentColor;}
  .t2-ico.cal i:nth-child(3){position:absolute;top:-1px;left:4px;width:2px;height:5px;background:currentColor;border-radius:2px;}
  .t2-ico.cal i:nth-child(4){position:absolute;top:-1px;right:4px;width:2px;height:5px;background:currentColor;border-radius:2px;}
  .t2-ico.bars{width:18px;height:16px;display:flex;align-items:flex-end;gap:3px;}
  .t2-ico.bars i{width:4px;background:currentColor;border-radius:2px;}
  .t2-ico.bars i:nth-child(1){height:8px;} .t2-ico.bars i:nth-child(2){height:15px;} .t2-ico.bars i:nth-child(3){height:11px;}
  .t2-ico.env{width:19px;height:14px;border:2px solid currentColor;border-radius:3px;}
  .t2-ico.env::after{content:"";position:absolute;top:1px;left:1px;right:1px;height:9px;border-top:2px solid currentColor;transform-origin:top;transform:scaleY(.7) skewX(0);clip-path:polygon(0 0,50% 70%,100% 0);}

  /* Écran plein (semaine / score / mail) */
  .t2-screen{position:fixed;inset:0;background:var(--bg);z-index:60;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);visibility:hidden;}
  .t2-screen.open{transform:none;visibility:visible;}
  .t2-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:calc(14px + env(safe-area-inset-top)) 8px 10px;}
  .t2-head .t2-title{font-family:'Poppins';font-weight:600;font-size:15px;color:var(--text);}
  .t2-ibtn{width:44px;height:44px;border:none;background:none;border-radius:50%;display:grid;place-items:center;cursor:pointer;color:var(--text);transition:background .15s;}
  .t2-ibtn:active{background:rgba(35,39,51,.07);}
  .t2-back{width:12px;height:12px;border-left:2.6px solid var(--text);border-bottom:2.6px solid var(--text);transform:rotate(45deg);margin-left:4px;}
  .t2-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 16px calc(24px + env(safe-area-inset-bottom));}
  .t2-sub{font-family:'Poppins';font-weight:700;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}

  /* Semaine (colonnes) */
  .t2-week-nav{display:flex;gap:6px;padding:8px 0 2px;}
  .t2-day-pill{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 3px;border-radius:12px;background:transparent;border:1.5px solid transparent;cursor:pointer;}
  .t2-day-pill.sel{background:rgba(255,107,90,.1);border-color:rgba(255,107,90,.5);}
  .t2-day-pill .dw{font:700 8.5px 'Poppins',sans-serif;letter-spacing:.4px;color:var(--muted);}
  .t2-day-pill .dn{font:700 14px 'Poppins',sans-serif;color:var(--text);}
  .t2-load{width:18px;height:4px;border-radius:2px;background:#E7DECF;overflow:hidden;}
  .t2-load i{display:block;height:100%;border-radius:2px;}
  .t2-cols{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 0 8px;}
  .t2-col{min-width:158px;width:158px;flex:0 0 auto;background:var(--surface2);border:1px solid var(--line);border-radius:16px;padding:10px 10px 12px;}
  .t2-col.today{border:2px solid var(--accent);}
  .t2-col-h{display:flex;align-items:center;gap:9px;}
  .t2-daybadge{width:40px;height:40px;flex:0 0 40px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px solid var(--line);}
  .t2-daybadge.today{background:var(--text);border:none;}
  .t2-daybadge .dw{font:700 8.5px 'Poppins',sans-serif;color:var(--muted);}
  .t2-daybadge.today .dw{color:rgba(255,255,255,.72);}
  .t2-daybadge .dn{font:700 15px 'Poppins',sans-serif;color:var(--text);line-height:1;}
  .t2-daybadge.today .dn{color:#fff;}
  .t2-col-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 9px;margin-top:7px;display:flex;gap:7px;align-items:flex-start;cursor:pointer;}
  .t2-col-card .tt{font-size:12.5px;line-height:1.3;color:var(--text);}
  .t2-col-card .mt{font-size:11px;color:var(--muted);margin-top:2px;}
  .t2-free{border:1.5px dashed #E4DBCB;border-radius:10px;min-height:56px;display:flex;align-items:center;justify-content:center;color:#B3AB9D;font-size:12px;margin-top:7px;}

  /* TOODSCORE */
  .t2-score-hero{position:relative;padding:14px 10px 6px;display:flex;flex-direction:column;align-items:center;text-align:center;overflow:hidden;}
  .t2-score-word{display:flex;gap:1px;font:700 15px 'Poppins',sans-serif;letter-spacing:.5px;margin-bottom:14px;}
  .t2-medal{width:142px;height:142px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 32px rgba(255,107,90,.28);}
  .t2-medal .in{width:114px;height:114px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .t2-medal .num{font:700 46px 'Poppins',sans-serif;line-height:.9;color:var(--accent);}
  .t2-medal .u{font:700 9px 'Poppins',sans-serif;letter-spacing:1.4px;color:var(--muted);margin-top:4px;}
  .t2-pill{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:6px 14px;font:600 12.5px 'Poppins',sans-serif;}
  .t2-chart{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 14px 12px;margin-top:14px;}
  .t2-chart .row{height:140px;display:flex;align-items:flex-end;gap:8px;}
  .t2-bar-col{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;}
  .t2-bar-col .v{font:700 11px 'Poppins',sans-serif;color:var(--text);}
  .t2-bar-col .b{width:100%;min-height:6px;border-radius:7px 7px 4px 4px;}
  .t2-bar-col .d{font-size:11px;font-weight:600;}
  .t2-stat{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 14px;}
  .t2-stat .k{font-size:11.5px;color:var(--muted);}
  .t2-stat .val{font:700 17px 'Poppins',sans-serif;margin-top:3px;color:var(--text);}
  .t2-share{width:100%;height:52px;margin-top:22px;border:none;border-radius:15px;background:var(--accent);color:#fff;font:700 15px 'Poppins',sans-serif;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 8px 22px rgba(255,107,90,.36);cursor:pointer;}
  .t2-share:active{background:var(--accent-press);}

  /* TOODMAIL */
  .t2-mailcard{background:linear-gradient(180deg,rgba(139,147,255,.12),rgba(139,147,255,.05));border:1px solid rgba(139,147,255,.28);border-radius:16px;padding:14px 15px;}
  .t2-mailtag{font:700 9px 'Poppins',sans-serif;letter-spacing:.8px;color:#5A63D8;background:rgba(139,147,255,.18);padding:3px 7px;border-radius:6px;}
  .t2-quote{font-size:13px;line-height:1.5;color:#6E675C;margin-top:8px;font-style:italic;border-left:2px solid rgba(139,147,255,.4);padding-left:10px;}
  .t2-when{flex:1;min-width:0;display:flex;align-items:center;gap:9px;background:#fff;border:1.5px dashed rgba(139,147,255,.55);border-radius:14px;padding:9px 10px;min-height:60px;text-align:left;cursor:pointer;}
  .t2-when.ok{border-style:solid;border-color:var(--lavande);background:rgba(139,147,255,.1);}
  .t2-when .lab{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;}
  .t2-when .st{align-self:flex-start;font:700 8.5px 'Poppins',sans-serif;letter-spacing:.6px;color:var(--muted);background:var(--surface2);padding:2.5px 6px;border-radius:5px;margin-top:4px;white-space:nowrap;}
  .t2-when.ok .st{color:#5A63D8;background:rgba(139,147,255,.16);}
  .t2-ck{width:20px;height:20px;border-radius:50%;background:var(--lavande);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;}
  .t2-when.ok .t2-ck{opacity:1;}
  .t2-ck i{width:7px;height:3.5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg);margin-top:-2px;}

  /* Feuille détail (2b) + confirmations */
  .t2-wrap{position:fixed;inset:0;z-index:70;visibility:hidden;}
  .t2-wrap.open{visibility:visible;}
  .t2-scrim{position:absolute;inset:0;background:rgba(35,39,51,.5);opacity:0;transition:opacity .3s;}
  .t2-wrap.open .t2-scrim{opacity:1;}
  .t2-sheet{position:absolute;left:0;right:0;bottom:0;max-height:94%;background:var(--bg);border-radius:24px 24px 0 0;transform:translateY(100%);transition:transform .34s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;}
  .t2-wrap.open .t2-sheet{transform:none;}
  .t2-grab{width:40px;height:4px;border-radius:999px;background:#E0D8C9;margin:10px auto 4px;}
  .t2-sheet-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:2px 16px 6px;}
  .t2-sheet-b{overflow-y:auto;padding:6px 18px 14px;}
  .t2-sheet-f{padding:12px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid #EFE8DB;}
  .t2-label{font:700 11px 'Poppins',sans-serif;letter-spacing:1.5px;color:var(--muted);margin:16px 2px 7px;}
  .t2-label:first-child{margin-top:2px;}
  .t2-input{width:100%;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 15px;font:600 18px 'Poppins',sans-serif;color:var(--text);}
  .t2-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,90,.14);}
  .t2-ta{width:100%;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;font:15px/1.5 system-ui,sans-serif;color:var(--text);resize:none;}
  .t2-ta:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,90,.14);}
  .t2-when2{flex:1;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 13px;min-height:52px;text-align:left;cursor:pointer;}
  .t2-when2 .v{font-size:14.5px;font-weight:600;color:var(--text);white-space:nowrap;}
  .t2-when2 .s{font-size:11.5px;color:var(--muted);}
  .t2-primary{width:100%;height:54px;border:none;border-radius:16px;color:#fff;font:700 16px 'Poppins',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:filter .15s,background .2s;}
  .t2-primary:active{filter:brightness(.96);}
  .t2-ok{background:var(--ok);box-shadow:0 8px 22px rgba(79,197,154,.42);}
  .t2-coral{background:var(--accent);box-shadow:0 8px 22px rgba(255,107,90,.4);}
  .t2-ghost{width:100%;height:48px;margin-top:8px;border:none;border-radius:14px;background:transparent;font:600 14px system-ui;color:var(--muted);cursor:pointer;}
  .t2-ghost:active{background:rgba(35,39,51,.05);}
  .t2-ghost.danger{color:var(--danger);}
  .t2-ghost.danger:active{background:rgba(229,72,77,.08);}
  .t2-srcstrip{display:flex;align-items:center;gap:9px;}
  .t2-tag{font:700 9px 'Poppins',sans-serif;letter-spacing:.8px;padding:3px 7px;border-radius:6px;}
  .t2-row2{display:flex;gap:9px;}
  .t2-toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-top:16px;}
  .t2-toggle .tt{font:600 14px system-ui;color:var(--text);}
  .t2-toggle .ts{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .t2-switch{width:46px;height:28px;border-radius:999px;background:#E0D8C9;position:relative;flex:0 0 46px;cursor:pointer;transition:background .2s;border:none;}
  .t2-switch.on{background:var(--urgent);}
  .t2-switch i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .t2-switch.on i{left:21px;}

  /* Confirmation suppression */
  .t2-confirm{position:absolute;inset:0;background:rgba(35,39,51,.5);display:none;align-items:flex-end;z-index:5;}
  .t2-confirm.open{display:flex;}
  .t2-confirm .box{width:100%;background:#fff;border-radius:24px 24px 0 0;padding:12px 22px calc(26px + env(safe-area-inset-bottom));}

  /* WARNINGTOOD (modale d'alerte) */
  .t2-warn{position:fixed;inset:0;z-index:80;background:var(--bg);display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s;visibility:hidden;}
  .t2-warn.open{transform:none;visibility:visible;}
  .t2-warn-band{margin:2px 14px 0;background:rgba(245,130,13,.12);border:1px solid rgba(245,130,13,.3);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:9px;font:600 12.5px system-ui;color:#C96A00;}
  .t2-warn-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px 26px;}
  .t2-warn-disc{width:132px;height:132px;border-radius:50%;background:radial-gradient(circle at 50% 42%,rgba(245,130,13,.26),rgba(245,130,13,.06));display:flex;align-items:center;justify-content:center;animation:pulseWarn 2s ease-out infinite;}
  .t2-warn-disc .in{width:92px;height:92px;border-radius:50%;background:var(--urgent);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px rgba(245,130,13,.44);}
  .t2-bell{width:28px;height:30px;position:relative;animation:bellRing 2.5s ease-in-out infinite;transform-origin:50% 2px;}
  .t2-bell i:nth-child(1){position:absolute;top:3px;left:4px;width:20px;height:17px;border:3px solid #fff;border-bottom:0;border-radius:11px 11px 0 0;}
  .t2-bell i:nth-child(2){position:absolute;bottom:6px;left:1px;width:26px;height:3px;background:#fff;border-radius:2px;}
  .t2-bell i:nth-child(3){position:absolute;bottom:0;left:10.5px;width:7px;height:7px;border-radius:0 0 6px 6px;background:#fff;}
  .t2-bell i:nth-child(4){position:absolute;top:-1px;left:11.5px;width:5px;height:5px;border-radius:50%;background:#fff;}

  @keyframes pulseWarn{0%{box-shadow:0 0 0 0 rgba(245,130,13,.42)}70%{box-shadow:0 0 0 18px rgba(245,130,13,0)}100%{box-shadow:0 0 0 0 rgba(245,130,13,0)}}
  @keyframes bellRing{0%,100%{transform:rotate(0)}12%{transform:rotate(13deg)}28%{transform:rotate(-11deg)}44%{transform:rotate(7deg)}60%{transform:rotate(-4deg)}72%{transform:rotate(0)}}

  /* Swipe */
  .t2-swipe{position:relative;margin-bottom:8px;border-radius:var(--radius);overflow:hidden;}
  .t2-swipe .task{margin-bottom:0;touch-action:pan-y;}
  .t2-swipe-act{position:absolute;top:0;bottom:0;display:flex;align-items:center;font:700 13px 'Poppins',sans-serif;color:#fff;padding:0 18px;}
  .t2-swipe-act.left{left:0;right:0;background:var(--ok);justify-content:flex-start;}
  .t2-swipe-act.right{left:0;right:0;background:var(--accent);justify-content:flex-end;}
  .t2-donewrap .t2-swipe-act{display:none;}

</style>

<body>

<header>
  <img class="logo" src="logo-header.png" alt="TOOD">
  <span class="date" id="today"></span>
  <button id="refresh" title="Actualiser">↻</button>
  <button id="settings" title="Réglages">⚙</button>
</header>

<main id="list">
  <div class="sk-label"></div>
  <div class="sk-card">
    <div class="sk-row"><div class="sk-dot"></div><div class="sk-lines"><div class="sk-line" style="width:64%"></div><div class="sk-line" style="width:34%;height:8px;opacity:.7"></div></div></div>
    <div class="sk-row"><div class="sk-dot"></div><div class="sk-lines"><div class="sk-line" style="width:52%"></div><div class="sk-line" style="width:28%;height:8px;opacity:.7"></div></div></div>
    <div class="sk-row"><div class="sk-dot"></div><div class="sk-lines"><div class="sk-line" style="width:70%"></div><div class="sk-line" style="width:24%;height:8px;opacity:.7"></div></div></div>
  </div>
  <div class="sk-label" style="width:120px"></div>
  <div class="sk-card">
    <div class="sk-row"><div class="sk-dot"></div><div class="sk-lines"><div class="sk-line" style="width:58%"></div><div class="sk-line" style="width:30%;height:8px;opacity:.7"></div></div></div>
  </div>
</main>

<div class="capture">
  <div class="chips">
    <button class="chip" data-when="today">Aujourd'hui</button>
    <button class="chip" data-when="tomorrow">Demain</button>
    <button class="chip" id="chip-date">📅 Date</button>
    <button class="chip" id="chip-time">🕐 Heure</button>
  </div>
  <div class="bar">
    <input type="text" id="titre" placeholder="Nouvelle tâche…" autocomplete="off">
    <input type="date" id="pick-date" hidden>
    <input type="time" id="pick-time" hidden>
    <input type="file" id="photo" accept="image/*" hidden>
    <button class="icon-btn" id="btn-photo" title="Photo / screenshot">📷</button>
    <button class="icon-btn send" id="btn-send" title="Ajouter">➤</button>
  </div>
</div>

<dialog id="dlg">
  <h2>Connexion à l'API</h2>
  <label>URL de la Web App Apps Script (/exec)</label>
  <input id="cfg-url" placeholder="https://script.google.com/macros/s/…/exec">
  <label>Token (APP_TOKEN)</label>
  <input id="cfg-token" placeholder="ton token secret">
  <button class="save" id="cfg-save">Enregistrer</button>
</dialog>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const cfg = { url: localStorage.getItem('apiUrl') || '', token: localStorage.getItem('apiToken') || '' };
let selDate = '', selTime = '';

/* ---- Init ---- */
$('today').textContent = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
if (!cfg.url || !cfg.token) openSettings(); else loadTasks();

/* ---- API ---- */
async function api(body) {
  const res = await fetch(cfg.url, { method: 'POST', body: JSON.stringify({ token: cfg.token, ...body }) });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'ERREUR_API');
  return data;
}
async function loadTasks() {
  try {
    const res = await fetch(`${cfg.url}?token=${encodeURIComponent(cfg.token)}&mode=tasks`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    render(data.tasks);
  } catch (e) { toast('Connexion impossible — vérifie les réglages'); render([]); }
}

/* ---- Rendu ---- */
function render(tasks) {
  const todayISO = new Date().toLocaleDateString('sv-SE');
  const tomorrowISO = new Date(Date.now() + 864e5).toLocaleDateString('sv-SE');
  const groups = { late: [], today: [], tomorrow: [], soon: [], nodate: [] };
  tasks.sort((a, b) => (a.date || '9999') === (b.date || '9999') ? (a.heure || '').localeCompare(b.heure || '') : (a.date || '9999').localeCompare(b.date || '9999'));
  tasks.forEach(t => {
    if (!t.date) groups.nodate.push(t);
    else if (t.date < todayISO) groups.late.push(t);
    else if (t.date === todayISO) groups.today.push(t);
    else if (t.date === tomorrowISO) groups.tomorrow.push(t);
    else groups.soon.push(t);
  });
  const labels = { late: 'En retard', today: "Aujourd'hui", tomorrow: 'Demain', soon: 'À venir', nodate: 'Sans date' };
  let html = '';
  for (const k of Object.keys(groups)) {
    if (!groups[k].length) continue;
    html += `<div class="section-label ${k === 'late' ? 'late' : ''}">${labels[k]}</div>`;
    html += groups[k].map(t => `
      <div class="task" id="t-${t.id}">
        <button class="check" onclick="complete('${t.id}')" aria-label="Terminer"></button>
        <div class="task-body">
          <div class="task-title">${esc(t.titre)}</div>
          <div class="task-meta">
            <span class="dot ${t.source}"></span>
            ${t.date && k === 'soon' ? fmtDate(t.date) : ''} ${t.heure ? '· ' + t.heure : ''}
          </div>
          ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
        </div>
      </div>`).join('');
  }
  $('list').innerHTML = html || `<div class="empty"><div class="display">Rien à faire ✦</div>Capture une tâche ou envoie un screenshot.</div>`;
}
const esc = s => String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const fmtDate = d => new Date(d + 'T12:00').toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });

/* ---- Actions ---- */
async function complete(id) {
  const el = $('t-' + id); el.classList.add('done');
  try { await api({ action: 'completeTask', id }); setTimeout(() => el.remove(), 300); }
  catch (e) { el.classList.remove('done'); toast('Échec — réessaie'); }
}
window.complete = complete;

$('btn-send').onclick = async () => {
  const titre = $('titre').value.trim();
  if (!titre) return;
  $('btn-send').disabled = true;
  try {
    await api({ action: 'addTask', titre, date: selDate, heure: selTime });
    $('titre').value = ''; resetChips();
    toast(selDate ? 'Tâche + rappel Calendar créés' : 'Tâche ajoutée');
    loadTasks();
  } catch (e) { toast('Échec de l\'ajout'); }
  $('btn-send').disabled = false;
};
$('titre').addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-send').click(); });

/* ---- Chips date/heure ---- */
document.querySelectorAll('.chip[data-when]').forEach(c => c.onclick = () => {
  const on = !c.classList.contains('on');
  document.querySelectorAll('.chip[data-when]').forEach(x => x.classList.remove('on'));
  $('chip-date').classList.remove('on');
  if (on) {
    c.classList.add('on');
    selDate = new Date(Date.now() + (c.dataset.when === 'tomorrow' ? 864e5 : 0)).toLocaleDateString('sv-SE');
  } else selDate = '';
});
$('chip-date').onclick = () => $('pick-date').showPicker ? $('pick-date').showPicker() : $('pick-date').click();
$('pick-date').onchange = e => {
  document.querySelectorAll('.chip[data-when]').forEach(x => x.classList.remove('on'));
  selDate = e.target.value;
  $('chip-date').textContent = '📅 ' + fmtDate(selDate);
  $('chip-date').classList.add('on');
};
$('chip-time').onclick = () => $('pick-time').showPicker ? $('pick-time').showPicker() : $('pick-time').click();
$('pick-time').onchange = e => {
  selTime = e.target.value;
  $('chip-time').textContent = '🕐 ' + selTime;
  $('chip-time').classList.add('on');
};
function resetChips() {
  selDate = ''; selTime = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  $('chip-date').textContent = '📅 Date'; $('chip-time').textContent = '🕐 Heure';
}

/* ---- Photo ---- */
$('btn-photo').onclick = () => $('photo').click();
$('photo').onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;
  toast('Compression…');
  const base64 = await resize(file, 1400, 0.8);
  try {
    await api({ action: 'uploadPhoto', base64, filename: file.name, mimeType: 'image/jpeg' });
    toast('Photo envoyée — analyse en cours');
    api({ action: 'processNow' }).then(r => { if (r.traites) { toast(r.traites + ' tâche(s) extraite(s)'); loadTasks(); } });
  } catch (err) { toast('Échec de l\'envoi'); }
  e.target.value = '';
};
function resize(file, maxDim, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = img.width * scale; cv.height = img.height * scale;
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      resolve(cv.toDataURL('image/jpeg', quality).split(',')[1]);
    };
    img.src = URL.createObjectURL(file);
  });
}

/* ---- Réglages ---- */
function openSettings() {
  $('cfg-url').value = cfg.url; $('cfg-token').value = cfg.token;
  $('dlg').showModal();
}
$('settings').onclick = openSettings;
$('cfg-save').onclick = () => {
  cfg.url = $('cfg-url').value.trim(); cfg.token = $('cfg-token').value.trim();
  localStorage.setItem('apiUrl', cfg.url); localStorage.setItem('apiToken', cfg.token);
  $('dlg').close(); loadTasks();
};
$('refresh').onclick = loadTasks;

/* ---- Toast ---- */
let toastTimer;
function toast(msg) {
  $('toast').textContent = msg; $('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $('toast').classList.remove('show'), 2600);
}
</script>

<script>
/* ===================================================================
   TOOD+ — Module additif. Ne modifie AUCUNE fonction du coeur.
   Réutilise window.api / window.loadTasks / window.toast / window.complete.
   Écrans : détail (feuille), semaine, TOODSCORE, TOODMAIL, WARNINGTOOD, swipe.
   =================================================================== */
(function () {
  'use strict';
  if (window.TOOD2) return;

  /* ---------- helpers ---------- */
  var LS = window.localStorage;
  function $(s, r) { return (r || document).querySelector(s); }
  function el(html) { var t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
  function todayISO() { return new Date().toLocaleDateString('sv-SE'); }
  function addDaysISO(n) { return new Date(Date.now() + n * 864e5).toLocaleDateString('sv-SE'); }
  function fmtDate(d) { try { return new Date(d + 'T12:00').toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' }); } catch (e) { return d; } }
  function toast(m) { if (window.toast) window.toast(m); }
  function jget(k, def) { try { return JSON.parse(LS.getItem(k)) || def; } catch (e) { return def; } }
  function jset(k, v) { try { LS.setItem(k, JSON.stringify(v)); } catch (e) {} }

  var T = window.TOOD2 = {
    tasks: [], pending: [],
    cfg: function () { return { url: LS.getItem('apiUrl') || '', token: LS.getItem('apiToken') || '' }; }
  };

  /* ---------- couche données (GET indépendant, même contrat) ---------- */
  async function loadData(force) {
    var c = T.cfg();
    if (!c.url || !c.token) return T.tasks;
    if (!force && T._lastLoad && (Date.now() - T._lastLoad) < 15000) return T.tasks;
    try {
      var res = await fetch(c.url + '?token=' + encodeURIComponent(c.token) + '&mode=tasks');
      var data = await res.json();
      if (data && data.ok) { T.tasks = data.tasks || []; T._lastLoad = Date.now(); }
    } catch (e) {}
    return T.tasks;
  }
  async function loadPending(force) {
    var c = T.cfg();
    if (!c.url || !c.token) return T.pending;
    if (!force && T._lastPending && (Date.now() - T._lastPending) < 15000) return T.pending;
    try {
      var res = await fetch(c.url + '?token=' + encodeURIComponent(c.token) + '&mode=pending');
      var data = await res.json();
      if (data && data.ok) { T.pending = data.tasks || []; T._lastPending = Date.now(); }
    } catch (e) {}
    return T.pending;
  }
  // Toutes les écritures passent par le api() du coeur (POST sans header -> pas de preflight CORS).
  async function act(body) {
    if (!window.api) throw new Error('api indisponible');
    return window.api(body);
  }
  function byId(id) { for (var i = 0; i < T.tasks.length; i++) if (T.tasks[i].id === id) return T.tasks[i]; return null; }

  /* ---------- journal de complétion (pour TOODSCORE, 100% local) ---------- */
  function logDone(id) {
    var log = jget('tood.doneLog', []);
    var day = todayISO();
    // évite doublon même tâche/même jour
    for (var i = 0; i < log.length; i++) if (log[i].id === id && log[i].d === day) return;
    log.push({ id: id, d: day, t: Date.now() });
    // garde 90 jours
    var cut = Date.now() - 90 * 864e5;
    log = log.filter(function (e) { return e.t >= cut; });
    jset('tood.doneLog', log);
    updateRecord();
  }
  function computeScore() {
    var log = jget('tood.doneLog', []);
    var byDay = {};
    log.forEach(function (e) { byDay[e.d] = (byDay[e.d] || 0) + 1; });
    // série : jours consécutifs avec >=1, en terminant aujourd'hui (ou hier si rien aujourd'hui)
    var streak = 0, cur = new Date();
    if (!byDay[todayISO()]) cur = new Date(Date.now() - 864e5); // tolère "pas encore fait aujourd'hui"
    for (;;) {
      var iso = cur.toLocaleDateString('sv-SE');
      if (byDay[iso]) { streak++; cur = new Date(cur.getTime() - 864e5); } else break;
    }
    // 7 derniers jours
    var bars = [], names = ['D', 'L', 'M', 'M', 'J', 'V', 'S'], weekDone = 0, best = 0, bestName = '—';
    for (var i = 6; i >= 0; i--) {
      var dt = new Date(Date.now() - i * 864e5);
      var iso2 = dt.toLocaleDateString('sv-SE');
      var n = byDay[iso2] || 0; weekDone += n;
      var lbl = names[dt.getDay()];
      bars.push({ d: lbl, n: n, today: i === 0 });
      if (n > best) { best = n; bestName = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'][dt.getDay()]; }
    }
    var record = jget('tood.record', 0);
    return { streak: streak, bars: bars, weekDone: weekDone, best: best, bestName: bestName, record: Math.max(record, streak) };
  }
  function updateRecord() { var s = computeScore(); if (s.streak > jget('tood.record', 0)) jset('tood.record', s.streak); }

  /* ---------- sets locaux (repli si le backend n'a pas encore les champs) ---------- */
  function urgentSet() { return jget('tood.urgent', {}); }
  function isUrgent(id) { var t = byId(id); return (t && t.urgent) || !!urgentSet()[id]; }
  function setUrgent(id, on) {
    var s = urgentSet(); if (on) s[id] = 1; else delete s[id]; jset('tood.urgent', s);
    act({ action: 'updateTask', id: id, urgent: on ? 1 : 0 }).catch(function () {});
    applyUrgent();
  }
  function confirmedSet() { return jget('tood.mailConfirmed', {}); }
  function mailQueue() {
    var conf = confirmedSet();
    return (T.pending || []).filter(function (t) { return !conf[t.id]; });
  }

  /* =================================================================
     INJECTION DOM
     ================================================================= */
  function injectHeaderButtons() {
    var header = $('header'); if (!header) return;
    var ref = $('#refresh', header);
    var week = el('<button class="t2-navbtn" id="t2-b-week" title="Semaine" aria-label="Semaine"><span class="t2-ico cal"><i></i><i></i><i></i><i></i></span></button>');
    var score = el('<button class="t2-navbtn" id="t2-b-score" title="TOODSCORE" aria-label="TOODSCORE"><span class="t2-ico bars"><i></i><i></i><i></i></span></button>');
    var mail = el('<button class="t2-navbtn" id="t2-b-mail" title="À confirmer" aria-label="Mails à confirmer" style="display:none"><span class="t2-ico env"></span><span class="t2-badge">0</span></button>');
    header.insertBefore(week, ref); header.insertBefore(score, ref); header.insertBefore(mail, ref);
    week.onclick = openWeek; score.onclick = openScore; mail.onclick = openMail;
  }

  function injectShells() {
    var root = el('<div id="t2-root"></div>');
    document.body.appendChild(root);

    // ---- Feuille détail (2b)
    root.appendChild(el(
      '<div class="t2-wrap" id="t2-detail">' +
        '<div class="t2-scrim" data-close></div>' +
        '<div class="t2-sheet">' +
          '<div class="t2-grab"></div>' +
          '<div class="t2-sheet-h">' +
            '<div class="t2-srcstrip" id="t2-d-src"></div>' +
            '<button class="t2-ibtn" id="t2-d-del" aria-label="Supprimer"><span style="width:16px;height:17px;position:relative;display:block"><i style="position:absolute;top:3px;left:1px;right:1px;height:13px;border:2px solid #8D867A;border-top:0;border-radius:0 0 4px 4px"></i><i style="position:absolute;top:2px;left:-1px;right:-1px;height:2.2px;background:#8D867A;border-radius:2px"></i><i style="position:absolute;top:-1px;left:5px;width:6px;height:3px;border:2px solid #8D867A;border-bottom:0;border-radius:3px 3px 0 0"></i></span></button>' +
          '</div>' +
          '<div class="t2-sheet-b">' +
            '<div class="t2-label">TITRE</div>' +
            '<input class="t2-input" id="t2-d-titre">' +

  /* =================================================================
     ROUTAGE
     ================================================================= */
  function lock(on) { document.body.style.overflow = on ? 'hidden' : ''; }
  function closeAll() {
    ['t2-week', 't2-score', 't2-mail'].forEach(function (id) { var e = $('#' + id); if (e) e.classList.remove('open'); });
    var d = $('#t2-detail'); if (d) d.classList.remove('open');
    var w = $('#t2-warn'); if (w) w.classList.remove('open');
    lock(false);
  }
  async function openWeek() { lock(true); await loadData(); renderWeek(); $('#t2-week').classList.add('open'); }
  async function openScore() { lock(true); renderScore(); $('#t2-score').classList.add('open'); }
  async function openMail() { lock(true); await loadPending(); renderMail(); $('#t2-mail').classList.add('open'); }

  /* =================================================================
     DÉTAIL (feuille 2b)
     ================================================================= */
  var curId = null, dirty = false, dDate = '', dTime = '';
  async function openDetail(id) {
    if (!byId(id)) await loadData(true);
    var t = byId(id) || { id: id, titre: '', date: '', heure: '', source: 'MANUEL', note: '' };
    curId = id; dirty = false; dDate = t.date || ''; dTime = t.heure || '';
    // source strip
    var srcMap = {
      PHOTO: { dot: '#F5B84D', label: 'Extrait d\u2019une photo', tag: 'PHOTO', bg: 'rgba(245,184,77,.2)', col: '#A87312' },
      MAIL: { dot: '#8B93FF', label: 'Reçue par mail', tag: 'MAIL', bg: 'rgba(139,147,255,.16)', col: '#5A63D8' },
      MANUEL: { dot: '#C9C1B2', label: 'Ajoutée à la main', tag: '', bg: '', col: '' }
    };
    var sm = srcMap[t.source] || srcMap.MANUEL;
    $('#t2-d-src').innerHTML = '<span style="width:9px;height:9px;border-radius:50%;background:' + sm.dot + ';display:block"></span><span style="font-size:12.5px;color:#8D867A">' + sm.label + '</span>' + (sm.tag ? '<span class="t2-tag" style="color:' + sm.col + ';background:' + sm.bg + '">' + sm.tag + '</span>' : '');
    $('#t2-d-titre').value = t.titre || '';
    $('#t2-d-note').value = t.note || '';
    refreshWhen();
    // urgent
    $('#t2-d-urgent').classList.toggle('on', isUrgent(id));
    $('#t2-d-save').style.display = 'none';
    $('#t2-d-confirm').classList.remove('open');
    $('#t2-detail').classList.add('open'); lock(true);
  }
  function refreshWhen() {
    $('#t2-d-datev').textContent = dDate ? fmtDate(dDate) : 'Ajouter';
    $('#t2-d-timev').textContent = dTime ? dTime : 'Ajouter';
  }
  function markDirty() { dirty = true; $('#t2-d-save').style.display = 'block'; }
  function closeDetail() { $('#t2-detail').classList.remove('open'); lock(false); curId = null; }

  function wireDetail() {
    $('#t2-d-titre').addEventListener('input', markDirty);
    $('#t2-d-note').addEventListener('input', markDirty);
    var pd = $('#t2-d-pdate'), pt = $('#t2-d-ptime');
    $('#t2-d-date').onclick = function () { try { pd.showPicker ? pd.showPicker() : pd.click(); } catch (e) { pd.click(); } };
    $('#t2-d-time').onclick = function () { try { pt.showPicker ? pt.showPicker() : pt.click(); } catch (e) { pt.click(); } };
    pd.onchange = function (e) { dDate = e.target.value; refreshWhen(); markDirty(); };
    pt.onchange = function (e) { dTime = e.target.value; refreshWhen(); markDirty(); };
    $('#t2-d-urgent').onclick = function () { var on = !this.classList.contains('on'); this.classList.toggle('on', on); setUrgent(curId, on); };
    $('#t2-detail .t2-scrim').addEventListener('click', closeDetail);

    $('#t2-d-done').onclick = async function () {
      try { await act({ action: 'completeTask', id: curId }); logDone(curId); toast('Bien joué \u2726'); if (window.loadTasks) window.loadTasks(); closeDetail(); }
      catch (e) { toast('Échec — réessaie'); }
    };
    $('#t2-d-save').onclick = async function () {
      var body = { action: 'updateTask', id: curId, titre: $('#t2-d-titre').value.trim(), date: dDate, heure: dTime, note: $('#t2-d-note').value };
      try { await act(body); dirty = false; this.style.display = 'none'; toast('Modifs enregistrées'); if (window.loadTasks) window.loadTasks(); }
      catch (e) { toast('« updateTask » à ajouter côté serveur'); }
    };
    function askDel() { $('#t2-d-cf-txt').innerHTML = '« ' + esc($('#t2-d-titre').value || 'Cette tâche') + ' » sera retirée définitivement.'; $('#t2-d-confirm').classList.add('open'); }
    $('#t2-d-del').onclick = askDel; $('#t2-d-del2').onclick = askDel;
    $('#t2-d-cf-no').onclick = function () { $('#t2-d-confirm').classList.remove('open'); };
    $('#t2-d-cf-yes').onclick = async function () {
      try { await act({ action: 'deleteTask', id: curId }); toast('Supprimé'); if (window.loadTasks) window.loadTasks(); closeDetail(); }
      catch (e) { $('#t2-d-confirm').classList.remove('open'); toast('« deleteTask » à ajouter côté serveur'); }
    };
  }

  /* =================================================================
     SEMAINE
     ================================================================= */
  var weekSel = 0;
  function buildWeek() {
    var conf = confirmedSet();
    var days = [];
    for (var i = 0; i < 7; i++) {
      var dt = new Date(Date.now() + i * 864e5);
      var iso = dt.toLocaleDateString('sv-SE');
      var items = T.tasks.filter(function (t) { return t.date === iso; }).sort(function (a, b) { return (a.heure || '').localeCompare(b.heure || ''); });
      days.push({ iso: iso, dow: ['DIM','LUN','MAR','MER','JEU','VEN','SAM'][dt.getDay()], dom: dt.getDate(), items: items, today: i === 0, dem: i === 1 });
    }
    return days;
  }
  function dotFor(s) { return s === 'PHOTO' ? '#F5B84D' : (s === 'MAIL' ? '#8B93FF' : '#C9C1B2'); }
  function renderWeek() {
    var days = buildWeek();
    var total = 0; days.forEach(function (d) { total += d.items.length; });
    $('#t2-week-range').textContent = days[0].dom + ' \u2013 ' + days[6].dom + ' ' + new Date(days[6].iso + 'T12:00').toLocaleDateString('fr-FR', { month: 'short' });
    $('#t2-week-total').textContent = total + (total > 1 ? ' tâches cette semaine' : ' tâche cette semaine');
    // nav
    var nav = $('#t2-week-nav'); nav.innerHTML = '';
    days.forEach(function (d, i) {
      var pct = Math.round(Math.min(d.items.length / 4, 1) * 100);
      var fill = d.items.length === 0 ? 'transparent' : (d.today ? '#FF6B5A' : '#C3B39B');
      var p = el('<button class="t2-day-pill' + (i === weekSel ? ' sel' : '') + '"><span class="dw">' + d.dow + '</span><span class="dn">' + d.dom + '</span><span class="t2-load"><i style="width:' + pct + '%;background:' + fill + '"></i></span></button>');
      p.onclick = function () { weekSel = i; renderWeek(); };
      nav.appendChild(p);
    });
    // colonnes
    var cols = $('#t2-week-cols'); cols.innerHTML = '';
    days.forEach(function (d, i) {
      var pct = Math.round(Math.min(d.items.length / 4, 1) * 100);
      var fill = d.items.length === 0 ? 'transparent' : (d.today ? '#FF6B5A' : '#C3B39B');
      var col = el('<div class="t2-col' + (d.today ? ' today' : '') + (i === weekSel ? '' : '') + '" style="' + (i === weekSel ? 'border:2px solid #FF6B5A' : '') + '"></div>');
      var label = d.today ? "Aujourd'hui" : (d.dem ? 'Demain' : d.items.length + (d.items.length > 1 ? ' tâches' : ' tâche'));
      col.appendChild(el('<div class="t2-col-h"><div class="t2-daybadge' + (d.today ? ' today' : '') + '"><span class="dw">' + d.dow + '</span><span class="dn">' + d.dom + '</span></div><div style="min-width:0"><div style="font-size:12px;font-weight:600;color:#232733">' + label + '</div><div class="t2-load" style="width:52px;height:5px;margin-top:4px"><i style="width:' + pct + '%;background:' + fill + '"></i></div></div></div>'));
      if (d.items.length === 0) {
        col.appendChild(el('<div class="t2-free">Libre \u2726</div>'));
      } else {
        d.items.forEach(function (t) {
          var c = el('<div class="t2-col-card"><span style="width:7px;height:7px;border-radius:50%;background:' + dotFor(t.source) + ';flex:0 0 7px;margin-top:5px"></span><div style="min-width:0"><div class="tt">' + esc(t.titre) + '</div>' + (t.heure ? '<div class="mt">' + t.heure + '</div>' : '') + '</div></div>');
          c.onclick = function () { openDetail(t.id); };
          col.appendChild(c);
        });
      }
      cols.appendChild(col);
    });
  }

  /* =================================================================
     TOODSCORE
     ================================================================= */
  function renderScore() {
    var s = computeScore();
    var deg = 240; // anneau décoratif
    var bars = s.bars.map(function (b) {
      var h = Math.round(Math.min(b.n / Math.max(5, s.best || 1), 1) * 100);
      var fill = b.today ? '#FF6B5A' : '#4FC59A';
      var lc = b.today ? '#E4523F' : '#8D867A';
      return '<div class="t2-bar-col"><span class="v">' + b.n + '</span><div style="width:100%;flex:1;display:flex;align-items:flex-end"><div class="b" style="height:' + h + '%;background:' + fill + '"></div></div><span class="d" style="color:' + lc + '">' + b.d + '</span></div>';
    }).join('');
    $('#t2-score-body').innerHTML =
      '<div class="t2-score-hero">' +
        '<div class="t2-medal" style="background:conic-gradient(#FF6B5A 0deg ' + deg + 'deg, rgba(255,107,90,.15) ' + deg + 'deg 360deg)"><div class="in"><span class="num">' + s.streak + '</span><span class="u">JOURS DE SÉRIE</span></div></div>' +
        '<div class="t2-pill" style="background:rgba(255,107,90,.12);border:1px solid rgba(255,107,90,.34);color:#E4523F;margin-top:16px"><span style="width:7px;height:7px;border-radius:50%;background:#FF6B5A"></span>' + (s.streak > 0 ? 'Série active · record ' + s.record : 'Lance ta série aujourd\u2019hui') + '</div>' +
      '</div>' +
      '<div style="display:flex;align-items:baseline;justify-content:space-between;margin:18px 2px 0"><span class="t2-sub">CETTE SEMAINE</span><span style="font-size:12.5px;color:#8D867A"><b style="font-family:\'Poppins\';color:#232733">' + s.weekDone + '</b> faites</span></div>' +
      '<div class="t2-chart"><div class="row">' + bars + '</div></div>' +
      '<div class="t2-row2" style="margin-top:14px"><div class="t2-stat"><div class="k">Meilleur jour</div><div class="val">' + s.bestName + '</div></div><div class="t2-stat"><div class="k">Record</div><div class="val" style="color:#2E9B77">' + s.record + ' j</div></div></div>' +
      '<button class="t2-share" id="t2-score-share"><span style="width:15px;height:15px;position:relative;display:block"><i style="position:absolute;top:1px;left:2.5px;width:9px;height:9px;border-top:2.6px solid #fff;border-left:2.6px solid #fff;transform:rotate(45deg)"></i><i style="position:absolute;top:2px;left:5.7px;width:2.6px;height:11px;background:#fff;border-radius:2px"></i></span>Partager mon TOODSCORE</button>';
    $('#t2-score-share').onclick = function () {
      var txt = 'Mon TOODSCORE : ' + s.streak + ' jours de série \u2726 (' + s.weekDone + ' tâches cette semaine)';
      if (navigator.share) navigator.share({ text: txt }).catch(function () {}); else toast(txt);
    };
  }

      '<div class="t2-sub" style="margin:0 2px 8px">DÉTECTÉ DANS LE MAIL</div>' +
      '<div class="t2-row2">' +
        '<button class="t2-when" id="t2-m-date"><span style="width:18px;height:18px;position:relative;display:block;flex:0 0 18px"><i style="position:absolute;top:2px;left:0;width:18px;height:15px;border:2px solid #8B93FF;border-radius:4px"></i><i style="position:absolute;top:6px;left:0;width:18px;height:2px;background:#8B93FF"></i><i style="position:absolute;top:-1px;left:4px;width:2px;height:5px;background:#8B93FF;border-radius:2px"></i><i style="position:absolute;top:-1px;right:4px;width:2px;height:5px;background:#8B93FF;border-radius:2px"></i></span><span style="flex:1;min-width:0;display:flex;flex-direction:column;gap:4px"><span class="lab">' + (t.date ? fmtDate(t.date) : 'Pas de date') + '</span><span class="st">À valider</span></span><span class="t2-ck"><i></i></span></button>' +
        '<button class="t2-when" id="t2-m-time"><span style="width:18px;height:18px;border:2px solid #8B93FF;border-radius:50%;position:relative;display:block;flex:0 0 18px"><i style="position:absolute;left:50%;top:50%;width:2px;height:5px;background:#8B93FF;transform:translate(-50%,-92%);border-radius:2px"></i><i style="position:absolute;left:50%;top:50%;width:5px;height:2px;background:#8B93FF;transform:translateY(-50%);border-radius:2px"></i></span><span style="flex:1;min-width:0;display:flex;flex-direction:column;gap:4px"><span class="lab">' + (t.heure || 'Pas d\u2019heure') + '</span><span class="st">À valider</span></span><span class="t2-ck"><i></i></span></button>' +
      '</div>' +
      '<div style="font-size:11.5px;color:#8D867A;margin:9px 2px 0">Tape un champ pour confirmer ce que TOOD a lu.</div>' +
      '<div style="height:16px"></div>' +
      '<button class="t2-primary t2-coral" id="t2-m-add"><span style="display:flex;width:22px;height:22px;align-items:center;justify-content:center"><i style="width:12px;height:6px;border-left:2.8px solid #fff;border-bottom:2.8px solid #fff;transform:rotate(-45deg);display:block;margin-top:-3px"></i></span>Oui, ajouter le TOOD</button>' +
      '<button class="t2-ghost" id="t2-m-skip">Ce n\u2019est pas une tâche</button>';
    $('#t2-m-date').onclick = function () { mailDate = !mailDate; this.classList.toggle('ok', mailDate); this.querySelector('.st').textContent = mailDate ? 'Validé' : 'À valider'; };
    $('#t2-m-time').onclick = function () { mailTime = !mailTime; this.classList.toggle('ok', mailTime); this.querySelector('.st').textContent = mailTime ? 'Validé' : 'À valider'; };
    $('#t2-m-add').onclick = async function () {
      try { await act({ action: 'confirmTask', id: t.id }); }
      catch (e) { var conf = confirmedSet(); conf[t.id] = 1; jset('tood.mailConfirmed', conf); }
      toast('TOOD confirmé \u2726'); await loadPending(true); refreshMailBadge(); renderMail();
      await loadData(true); if (window.loadTasks) window.loadTasks();
    };
    $('#t2-m-skip').onclick = async function () {
      try { await act({ action: 'deleteTask', id: t.id }); }
      catch (e) { var conf = confirmedSet(); conf[t.id] = 1; jset('tood.mailConfirmed', conf); }
      toast('Sans suite'); await loadPending(true); refreshMailBadge(); renderMail();
    };
  }

  /* =================================================================
     WARNINGTOOD — style dans la liste + alerte + rappel horaire (app ouverte)
     ================================================================= */
  function applyUrgent() {
    document.querySelectorAll('#list .task').forEach(function (row) {
      var id = (row.id || '').replace(/^t-/, '');
      row.classList.toggle('urgent', isUrgent(id));
    });
  }
  function firstUrgentOverdue() {
    var today = todayISO();
    for (var i = 0; i < T.tasks.length; i++) {
      var t = T.tasks[i];
      if (isUrgent(t.id) && t.date && t.date <= today) return t;
    }
    // sinon n'importe quelle urgente
    for (var j = 0; j < T.tasks.length; j++) if (isUrgent(T.tasks[j].id)) return T.tasks[j];
    return null;
  }
  var warnId = null;
  function showWarn(t) {
    if (!t) return;
    warnId = t.id;
    $('#t2-warn-title').textContent = t.titre || '';
    $('#t2-warn-sub').textContent = (t.date ? 'Prévu le ' + fmtDate(t.date) + (t.heure ? ' · ' + t.heure : '') + ' · ' : '') + 'rappel chaque heure';
    $('#t2-warn').classList.add('open'); lock(true);
  }
  function wireWarn() {
    $('#t2-warn-done').onclick = async function () {
      try { await act({ action: 'completeTask', id: warnId }); logDone(warnId); setUrgent(warnId, false); toast('Réglé \u2726'); if (window.loadTasks) window.loadTasks(); }
      catch (e) { toast('Échec — réessaie'); }
      closeAll();
    };
    $('#t2-warn-snooze').onclick = async function () {
      try { await act({ action: 'updateTask', id: warnId, date: addDaysISO(0), heure: '' }); } catch (e) {}
      toast('Repoussé d\u2019une heure'); closeAll();
    };
    $('#t2-warn-mute').onclick = function () { setUrgent(warnId, false); toast('Rappels coupés'); if (window.loadTasks) window.loadTasks(); closeAll(); };
  }
  // rappel horaire tant que l'app est ouverte (le vrai push horaire = trigger Apps Script)
  function startHourly() {
    setInterval(function () {
      if (document.hidden) return;
      var t = firstUrgentOverdue();
      if (t) toast('\u23F0 Urgent : ' + t.titre);
    }, 3600000);
  }

  /* =================================================================
     LISTE : tap -> détail, swipe, urgence, journal de complétion
     ================================================================= */
  function enhanceRow(row) {
    if (row.dataset.t2) return; row.dataset.t2 = '1';
    var id = (row.id || '').replace(/^t-/, '');
    // urgence
    row.classList.toggle('urgent', isUrgent(id));
    // wrap pour swipe
    var wrap = document.createElement('div'); wrap.className = 't2-swipe';
    row.parentNode.insertBefore(wrap, row);
    wrap.appendChild(el('<div class="t2-swipe-act left">\u2713 Terminer</div>'));
    wrap.appendChild(el('<div class="t2-swipe-act right">Demain \u2192</div>'));
    wrap.appendChild(row);
    // swipe tactile
    var x0 = null, dx = 0, moving = false;
    row.addEventListener('touchstart', function (e) { x0 = e.touches[0].clientX; dx = 0; moving = false; row.style.transition = 'none'; }, { passive: true });
    row.addEventListener('touchmove', function (e) {
      if (x0 == null) return;
      dx = e.touches[0].clientX - x0;
      if (Math.abs(dx) > 6) moving = true;
      row.style.transform = 'translateX(' + dx + 'px)';
    }, { passive: true });
    row.addEventListener('touchend', function () {
      row.style.transition = 'transform .3s cubic-bezier(.22,1,.36,1)';
      var TH = 96;
      if (dx > TH) { row.style.transform = 'translateX(0)'; if (window.complete) window.complete(id); }
      else if (dx < -TH) { row.style.transform = 'translateX(0)'; reporter(id); }
      else { row.style.transform = 'translateX(0)'; }
      x0 = null;
    });
    // tap -> détail (hors coche)
    row.addEventListener('click', function (e) {
      if (moving) { moving = false; return; }
      if (e.target.closest('.check')) return; // laisse complete()
      openDetail(id);
    });
  }
  async function reporter(id) {
    try { await act({ action: 'updateTask', id: id, date: addDaysISO(1) }); toast('Reporté à demain'); if (window.loadTasks) window.loadTasks(); }
    catch (e) { toast('« updateTask » à ajouter côté serveur'); }
  }
  function scanList() {
    var list = $('#list'); if (!list) return;
    list.querySelectorAll('.task:not([data-t2])').forEach(enhanceRow);
    list.querySelectorAll('.t2-swipe').forEach(function (w) { if (!w.querySelector('.task')) w.remove(); });
  }
  function observeList() {
    var list = $('#list'); if (!list) return;
    var mo = new MutationObserver(function () { scanList(); });
    mo.observe(list, { childList: true });
    // journal + masquage swipe au tap sur la coche (complétion cœur)
    list.addEventListener('click', function (e) {
      var ck = e.target.closest('.check'); if (!ck) return;
      var row = ck.closest('.task'); if (!row) return;
      var id = (row.id || '').replace(/^t-/, '');
      var w = row.closest('.t2-swipe'); if (w) w.classList.add('t2-donewrap');
      setTimeout(function () { logDone(id); }, 400);
    });
    scanList();
  }

  /* =================================================================
     INIT
     ================================================================= */
  function init() {
    injectHeaderButtons();
    injectShells();
    wireDetail();
    wireWarn();
    observeList();
    startHourly();
    // chargement différé : laisse le cœur charger la liste d'abord (perf)
    setTimeout(function () {
      loadData().then(function () { applyUrgent(); updateRecord(); });
      loadPending().then(refreshMailBadge);
    }, 1500);
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) return;
      loadData(true).then(function () { applyUrgent(); });
      loadPending(true).then(refreshMailBadge);
    });
    // expose pour debug/tests
    T.openDetail = openDetail; T.openWeek = openWeek; T.openScore = openScore; T.openMail = openMail; T.showWarn = showWarn; T.firstUrgentOverdue = firstUrgentOverdue;
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();

</script>
