<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBF6EF">
<title>TOOD</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FBF6EF; --surface: #FFFFFF; --surface2: #F3ECE1;
    --text: #232733; --muted: #8D867A; --line: #E9E1D4;
    --accent: #FF6B5A; --ambre: #F5B84D; --lavande: #8B93FF;
    --ok: #4FC59A; --danger: #E5484D;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.45 system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .display { font-family: 'Poppins', system-ui, sans-serif; }

  /* ---- Header ---- */
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 18px 18px 12px;
  }
  header .logo { height: 30px; display: block; }
  header .date {
    color: var(--muted); font-size: 13px; flex: 1;
    text-transform: capitalize; padding-top: 4px;
  }
  header button {
    background: none; border: none; color: var(--muted); font-size: 18px;
    padding: 4px 8px; cursor: pointer;
  }

  /* ---- Liste ---- */
  main { flex: 1; overflow-y: auto; padding: 0 14px 150px; }
  .section-label {
    font-family: 'Poppins'; font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); margin: 20px 6px 8px;
  }
  .section-label.late { color: var(--danger); }
  .task {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 13px 14px; margin-bottom: 8px;
    box-shadow: 0 1px 2px rgba(35, 39, 51, .04);
    transition: opacity .25s, transform .25s;
  }
  .task.done { opacity: 0; transform: translateX(30px); }
  .check {
    flex-shrink: 0; width: 22px; height: 22px; margin-top: 1px;
    border: 2px solid #CFC7B8; border-radius: 50%;
    background: none; cursor: pointer; transition: all .15s;
  }
  .check:active { border-color: var(--ok); background: var(--ok); transform: scale(0.9); }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-weight: 500; overflow-wrap: break-word; }
  .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; font-size: 12px; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.MANUEL { background: #C9C1B2; }
  .dot.PHOTO  { background: var(--ambre); }
  .dot.MAIL   { background: var(--lavande); }
  .task-note { font-size: 12px; color: var(--muted); margin-top: 2px; overflow-wrap: break-word; }
  .empty { text-align: center; color: var(--muted); margin-top: 70px; font-size: 14px; }
  .empty .display { font-size: 17px; color: var(--text); margin-bottom: 6px; font-weight: 600; }

  /* ---- Barre de capture ---- */
  .capture {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, var(--bg) 22%);
    padding: 26px 12px calc(12px + env(safe-area-inset-bottom));
  }
  .chips { display: flex; gap: 7px; margin-bottom: 9px; overflow-x: auto; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; background: var(--surface); color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 13px; font-size: 13px; cursor: pointer;
  }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #FFFFFF; font-weight: 600; }
  .bar {
    display: flex; gap: 8px; align-items: center;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 999px; padding: 6px 6px 6px 16px;
    box-shadow: 0 2px 10px rgba(35, 39, 51, .07);
  }
  .bar input[type=text] {
    flex: 1; min-width: 0; background: none; border: none; outline: none;
    color: var(--text); font-size: 15px;
  }
  .bar input::placeholder { color: var(--muted); }
  .icon-btn {
    flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%;
    border: none; background: var(--surface2); color: var(--text);
    font-size: 17px; cursor: pointer; display: grid; place-items: center;
  }
  .icon-btn.send { background: var(--accent); color: #FFFFFF; }
  .icon-btn:disabled { opacity: .4; }

  /* ---- Modal réglages ---- */
  dialog {
    background: var(--surface); color: var(--text); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 22px; width: min(92vw, 380px);
    margin: auto;
  }
  dialog::backdrop { background: rgba(35, 39, 51, .45); }
  dialog h2 { font-family: 'Poppins'; font-size: 17px; font-weight: 600; margin-bottom: 14px; }
  dialog label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; }
  dialog input {
    width: 100%; background: var(--bg); border: 1px solid var(--line);
    border-radius: 8px; padding: 10px; color: var(--text); font-size: 14px;
  }
  dialog .save {
    margin-top: 18px; width: 100%; padding: 12px;
    background: var(--accent); color: #FFFFFF; font-weight: 600;
    border: none; border-radius: 10px; font-size: 15px; cursor: pointer;
    font-family: 'Poppins';
  }

  /* ---- Toast ---- */
  #toast {
    position: fixed; left: 50%; bottom: 130px; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: #FBF6EF;
    padding: 10px 18px; border-radius: 999px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: all .25s; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<header>
  <img class="logo" src="logo-header.png" alt="TOOD">
  <span class="date" id="today"></span>
  <button id="refresh" title="Actualiser">↻</button>
  <button id="settings" title="Réglages">⚙</button>
</header>

<main id="list"><div class="empty">Chargement…</div></main>

<div class="capture">
  <div class="chips">
    <button class="chip" data-when="today">Aujourd'hui</button>
    <button class="chip" data-when="tomorrow">Demain</button>
    <button class="chip" id="chip-date">📅 Date</button>
    <button class="chip" id="chip-time">🕐 Heure</button>
  </div>
  <div class="bar">
    <input type="text" id="titre" placeholder="Nouvelle tâche…" autocomplete="off">
    <input type="date" id="pick-date" hidden>
    <input type="time" id="pick-time" hidden>
    <input type="file" id="photo" accept="image/*" hidden>
    <button class="icon-btn" id="btn-photo" title="Photo / screenshot">📷</button>
    <button class="icon-btn send" id="btn-send" title="Ajouter">➤</button>
  </div>
</div>

<dialog id="dlg">
  <h2>Connexion à l'API</h2>
  <label>URL de la Web App Apps Script (/exec)</label>
  <input id="cfg-url" placeholder="https://script.google.com/macros/s/…/exec">
  <label>Token (APP_TOKEN)</label>
  <input id="cfg-token" placeholder="ton token secret">
  <button class="save" id="cfg-save">Enregistrer</button>
</dialog>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const cfg = { url: localStorage.getItem('apiUrl') || '', token: localStorage.getItem('apiToken') || '' };
let selDate = '', selTime = '';

/* ---- Init ---- */
$('today').textContent = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
if (!cfg.url || !cfg.token) openSettings(); else loadTasks();

/* ---- API ---- */
async function api(body) {
  const res = await fetch(cfg.url, { method: 'POST', body: JSON.stringify({ token: cfg.token, ...body }) });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'ERREUR_API');
  return data;
}
async function loadTasks() {
  try {
    const res = await fetch(`${cfg.url}?token=${encodeURIComponent(cfg.token)}&mode=tasks`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    render(data.tasks);
  } catch (e) { toast('Connexion impossible — vérifie les réglages'); render([]); }
}

/* ---- Rendu ---- */
function render(tasks) {
  const todayISO = new Date().toLocaleDateString('sv-SE');
  const tomorrowISO = new Date(Date.now() + 864e5).toLocaleDateString('sv-SE');
  const groups = { late: [], today: [], tomorrow: [], soon: [], nodate: [] };
  tasks.sort((a, b) => (a.date || '9999') === (b.date || '9999') ? (a.heure || '').localeCompare(b.heure || '') : (a.date || '9999').localeCompare(b.date || '9999'));
  tasks.forEach(t => {
    if (!t.date) groups.nodate.push(t);
    else if (t.date < todayISO) groups.late.push(t);
    else if (t.date === todayISO) groups.today.push(t);
    else if (t.date === tomorrowISO) groups.tomorrow.push(t);
    else groups.soon.push(t);
  });
  const labels = { late: 'En retard', today: "Aujourd'hui", tomorrow: 'Demain', soon: 'À venir', nodate: 'Sans date' };
  let html = '';
  for (const k of Object.keys(groups)) {
    if (!groups[k].length) continue;
    html += `<div class="section-label ${k === 'late' ? 'late' : ''}">${labels[k]}</div>`;
    html += groups[k].map(t => `
      <div class="task" id="t-${t.id}">
        <button class="check" onclick="complete('${t.id}')" aria-label="Terminer"></button>
        <div class="task-body">
          <div class="task-title">${esc(t.titre)}</div>
          <div class="task-meta">
            <span class="dot ${t.source}"></span>
            ${t.date && k === 'soon' ? fmtDate(t.date) : ''} ${t.heure ? '· ' + t.heure : ''}
          </div>
          ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
        </div>
      </div>`).join('');
  }
  $('list').innerHTML = html || `<div class="empty"><div class="display">Rien à faire ✦</div>Capture une tâche ou envoie un screenshot.</div>`;
}
const esc = s => String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const fmtDate = d => new Date(d + 'T12:00').toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });

/* ---- Actions ---- */
async function complete(id) {
  const el = $('t-' + id); el.classList.add('done');
  try { await api({ action: 'completeTask', id }); setTimeout(() => el.remove(), 300); }
  catch (e) { el.classList.remove('done'); toast('Échec — réessaie'); }
}
window.complete = complete;

$('btn-send').onclick = async () => {
  const titre = $('titre').value.trim();
  if (!titre) return;
  $('btn-send').disabled = true;
  try {
    await api({ action: 'addTask', titre, date: selDate, heure: selTime });
    $('titre').value = ''; resetChips();
    toast(selDate ? 'Tâche + rappel Calendar créés' : 'Tâche ajoutée');
    loadTasks();
  } catch (e) { toast('Échec de l\'ajout'); }
  $('btn-send').disabled = false;
};
$('titre').addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-send').click(); });

/* ---- Chips date/heure ---- */
document.querySelectorAll('.chip[data-when]').forEach(c => c.onclick = () => {
  const on = !c.classList.contains('on');
  document.querySelectorAll('.chip[data-when]').forEach(x => x.classList.remove('on'));
  $('chip-date').classList.remove('on');
  if (on) {
    c.classList.add('on');
    selDate = new Date(Date.now() + (c.dataset.when === 'tomorrow' ? 864e5 : 0)).toLocaleDateString('sv-SE');
  } else selDate = '';
});
$('chip-date').onclick = () => $('pick-date').showPicker ? $('pick-date').showPicker() : $('pick-date').click();
$('pick-date').onchange = e => {
  document.querySelectorAll('.chip[data-when]').forEach(x => x.classList.remove('on'));
  selDate = e.target.value;
  $('chip-date').textContent = '📅 ' + fmtDate(selDate);
  $('chip-date').classList.add('on');
};
$('chip-time').onclick = () => $('pick-time').showPicker ? $('pick-time').showPicker() : $('pick-time').click();
$('pick-time').onchange = e => {
  selTime = e.target.value;
  $('chip-time').textContent = '🕐 ' + selTime;
  $('chip-time').classList.add('on');
};
function resetChips() {
  selDate = ''; selTime = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  $('chip-date').textContent = '📅 Date'; $('chip-time').textContent = '🕐 Heure';
}

/* ---- Photo ---- */
$('btn-photo').onclick = () => $('photo').click();
$('photo').onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;
  toast('Compression…');
  const base64 = await resize(file, 1400, 0.8);
  try {
    await api({ action: 'uploadPhoto', base64, filename: file.name, mimeType: 'image/jpeg' });
    toast('Photo envoyée — analyse en cours');
    api({ action: 'processNow' }).then(r => { if (r.traites) { toast(r.traites + ' tâche(s) extraite(s)'); loadTasks(); } });
  } catch (err) { toast('Échec de l\'envoi'); }
  e.target.value = '';
};
function resize(file, maxDim, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = img.width * scale; cv.height = img.height * scale;
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      resolve(cv.toDataURL('image/jpeg', quality).split(',')[1]);
    };
    img.src = URL.createObjectURL(file);
  });
}

/* ---- Réglages ---- */
function openSettings() {
  $('cfg-url').value = cfg.url; $('cfg-token').value = cfg.token;
  $('dlg').showModal();
}
$('settings').onclick = openSettings;
$('cfg-save').onclick = () => {
  cfg.url = $('cfg-url').value.trim(); cfg.token = $('cfg-token').value.trim();
  localStorage.setItem('apiUrl', cfg.url); localStorage.setItem('apiToken', cfg.token);
  $('dlg').close(); loadTasks();
};
$('refresh').onclick = loadTasks;

/* ---- Toast ---- */
let toastTimer;
function toast(msg) {
  $('toast').textContent = msg; $('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $('toast').classList.remove('show'), 2600);
}
</script>
</body>
</html>
