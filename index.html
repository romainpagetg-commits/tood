<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBF6EF">
<title>TOOD</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF6EF; --surface:#FFFFFF; --surface2:#F3ECE1;
    --text:#232733; --muted:#8D867A; --line:#E9E1D4;
    --accent:#FF6B5A; --accent-press:#F2543F;
    --ambre:#F5B84D; --lavande:#8B93FF; --ok:#4FC59A; --danger:#E5484D;
    --urgent:#F5820D;            /* WARNINGTOOD — urgence, jamais decoratif */
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font:15px/1.45 system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    display:flex; flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .display{font-family:'Poppins',system-ui,sans-serif;}
  ::selection{background:rgba(255,107,90,.2);}
  a{color:var(--accent);} a:hover{color:var(--accent-press);}

  /* ---- Header ---- */
  header{display:flex; align-items:center; gap:10px; padding:16px 14px 10px 16px;}
  header .logo{height:26px; display:block;}
  header .date{color:var(--muted); font-size:12.5px; flex:1; text-transform:capitalize; padding-top:2px;}
  header button{
    width:44px; height:44px; border:none; background:none; color:var(--text);
    font-size:19px; cursor:pointer; border-radius:50%; display:grid; place-items:center;
    transition:background .15s;
  }
  header button:active{background:rgba(35,39,51,.07);}

  /* ---- Liste ---- */
  main{flex:1; overflow-y:auto; padding:2px 14px 162px;}
  .section-label{
    font-family:'Poppins'; font-size:11px; font-weight:600; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--muted); margin:20px 6px 9px;
  }
  .section-label.late{color:var(--danger);}
  .task{
    display:flex; align-items:flex-start; gap:11px;
    background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius); padding:12px 13px; margin-bottom:8px;
    box-shadow:0 1px 2px rgba(35,39,51,.05);
    transition:opacity .28s ease, transform .28s ease;
  }
  .task.done{opacity:0; transform:translateX(34px);}
  .check{
    flex-shrink:0; width:26px; height:26px; margin-top:1px; padding:0;
    border:2px solid #D8CFC0; border-radius:50%; background:var(--surface);
    position:relative; cursor:pointer;
    transition:background .18s, border-color .18s, transform .18s;
  }
  .check::after{
    content:""; position:absolute; left:8px; top:4px;
    width:6px; height:11px; border:solid #fff; border-width:0 2.5px 2.5px 0;
    transform:rotate(45deg) scale(.3); opacity:0;
    transition:opacity .15s, transform .22s cubic-bezier(.34,1.56,.64,1);
  }
  .check:active{border-color:var(--ok); background:var(--ok); transform:scale(.9);}
  .check:active::after{opacity:1; transform:rotate(45deg) scale(1);}
  .task.done .check{border-color:var(--ok); background:var(--ok);}
  .task.done .check::after{opacity:1; transform:rotate(45deg) scale(1);}
  .task.done .task-title{color:var(--muted); text-decoration:line-through;}
  .task-body{flex:1; min-width:0; padding-top:1px;}
  .task-title{font-weight:500; font-size:15.5px; overflow-wrap:break-word;}
  .task-meta{display:flex; align-items:center; gap:7px; margin-top:4px; font-size:12.5px; color:var(--muted); font-weight:500;}
  .dot{width:7px; height:7px; border-radius:50%; flex-shrink:0;}
  .dot.MANUEL{background:#C9C1B2;}
  .dot.PHOTO{background:var(--ambre);}
  .dot.MAIL{background:var(--lavande);}
  .task-note{font-size:12.5px; color:var(--muted); margin-top:3px; overflow-wrap:break-word;}

  /* ---- Urgence (WARNINGTOOD) : ajouter la classe .urgent sur .task cote rendu ---- */
  .task.urgent{border-color:rgba(245,130,13,.4); border-left:4px solid var(--urgent); box-shadow:0 2px 8px rgba(245,130,13,.14);}
  .task.urgent .task-meta{color:#C96A00;}

  /* ---- Etat vide ---- */
  .empty{text-align:center; color:var(--muted); margin-top:64px; font-size:14px; padding:0 32px; line-height:1.5;}
  .empty::before{
    content:""; display:block; width:60px; height:60px; margin:0 auto 16px;
    border-radius:50%; background:rgba(79,197,154,.16);
  }
  .empty .display{font-size:19px; color:var(--text); margin-bottom:6px; font-weight:700;}

  /* ---- Squelette de chargement ---- */
  .sk-label{height:11px; width:92px; border-radius:5px; margin:22px 6px 12px;}
  .sk-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:2px 13px; margin-bottom:8px;}
  .sk-row{display:flex; align-items:center; gap:12px; min-height:56px; border-top:1px solid #F3ECE1;}
  .sk-card .sk-row:first-child{border-top:0;}
  .sk-dot{width:24px; height:24px; border-radius:50%; flex:0 0 24px;}
  .sk-lines{flex:1; display:flex; flex-direction:column; gap:7px;}
  .sk-line{height:11px; border-radius:5px;}
  .sk-label,.sk-dot,.sk-line{background:linear-gradient(100deg,#EFE7DA 40%,#F8F3EA 50%,#EFE7DA 60%); background-size:200% 100%; animation:sk 1.4s linear infinite;}
  @keyframes sk{0%{background-position:140% 0} 100%{background-position:-40% 0}}

  /* ---- Barre de capture ---- */
  .capture{
    position:fixed; bottom:0; left:0; right:0;
    background:linear-gradient(transparent, var(--bg) 26%);
    padding:28px 12px calc(12px + env(safe-area-inset-bottom));
  }
  .chips{display:flex; gap:7px; margin-bottom:9px; overflow-x:auto; scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0; background:var(--surface); color:var(--text);
    border:1.5px solid var(--line); border-radius:999px;
    padding:9px 14px; font-size:13px; font-weight:600; font-family:'Poppins',sans-serif; cursor:pointer;
    white-space:nowrap; transition:background .15s, border-color .15s;
  }
  .chip.on{background:rgba(255,107,90,.12); border-color:rgba(255,107,90,.45); color:var(--accent-press);}
  .bar{
    display:flex; gap:8px; align-items:center;
    background:var(--surface); border:1px solid var(--line);
    border-radius:999px; padding:6px 6px 6px 8px;
    box-shadow:0 10px 30px rgba(35,39,51,.12);
  }
  .bar input[type=text]{flex:1; min-width:0; background:none; border:none; outline:none; color:var(--text); font-size:16px; padding-left:8px;}
  .bar input::placeholder{color:var(--muted);}
  .icon-btn{
    flex-shrink:0; width:44px; height:44px; border-radius:50%;
    border:none; background:var(--surface2); color:var(--text);
    font-size:17px; cursor:pointer; display:grid; place-items:center; transition:background .15s;
  }
  .icon-btn:active{background:#EDE3D3;}
  .icon-btn.send{background:var(--accent); color:#fff; box-shadow:0 4px 12px rgba(255,107,90,.38);}
  .icon-btn.send:active{background:var(--accent-press);}
  .icon-btn:disabled{opacity:.4;}

  /* ---- Modal reglages ---- */
  dialog{background:var(--surface); color:var(--text); border:1px solid var(--line); border-radius:var(--radius); padding:22px; width:min(92vw,380px); margin:auto;}
  dialog::backdrop{background:rgba(35,39,51,.45);}
  dialog h2{font-family:'Poppins'; font-size:17px; font-weight:600; margin-bottom:14px;}
  dialog label{display:block; font-size:12px; color:var(--muted); margin:12px 0 4px;}
  dialog input{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:11px; color:var(--text); font-size:14px;}
  dialog input:focus{outline:none; border-color:var(--accent);}
  dialog .save{margin-top:18px; width:100%; padding:13px; background:var(--accent); color:#fff; font-weight:600; border:none; border-radius:10px; font-size:15px; cursor:pointer; font-family:'Poppins';}

  /* ---- Toast ---- */
  #toast{position:fixed; left:50%; bottom:132px; transform:translateX(-50%) translateY(20px); background:var(--text); color:#FBF6EF; padding:11px 18px; border-radius:999px; font-size:13px; opacity:0; pointer-events:none; transition:all .25s; white-space:nowrap; box-shadow:0 8px 24px rgba(35,39,51,.25);}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion:reduce){*{transition:none !important; animation:none !important;}}
</style>
</head>
<body>

<header>
  <img class="logo" src="logo-header.png" alt="TOOD">
  <span class="date" id="today"></span>
  <button id="refresh" title="Actualiser">↻</button>
  <button id="settings" title="Réglages">⚙</button>
</header>

<main id="list">
  <div class="sk-label"></div>
  <div class="sk-card">
    <div class="sk-row"><div class="sk-dot"></div><div class="sk-lines"><div class="sk-line" style="width:64%"></div><div class="sk-line" style="width:34%;height:8px;opacity:.7"></div></div></div>
    <div class="sk-row"><div class="sk-dot"></div><div class="sk-lines"><div class="sk-line" style="width:52%"></div><div class="sk-line" style="width:28%;height:8px;opacity:.7"></div></div></div>
    <div class="sk-row"><div class="sk-dot"></div><div class="sk-lines"><div class="sk-line" style="width:70%"></div><div class="sk-line" style="width:24%;height:8px;opacity:.7"></div></div></div>
  </div>
  <div class="sk-label" style="width:120px"></div>
  <div class="sk-card">
    <div class="sk-row"><div class="sk-dot"></div><div class="sk-lines"><div class="sk-line" style="width:58%"></div><div class="sk-line" style="width:30%;height:8px;opacity:.7"></div></div></div>
  </div>
</main>

<div class="capture">
  <div class="chips">
    <button class="chip" data-when="today">Aujourd'hui</button>
    <button class="chip" data-when="tomorrow">Demain</button>
    <button class="chip" id="chip-date">📅 Date</button>
    <button class="chip" id="chip-time">🕐 Heure</button>
  </div>
  <div class="bar">
    <input type="text" id="titre" placeholder="Nouvelle tâche…" autocomplete="off">
    <input type="date" id="pick-date" hidden>
    <input type="time" id="pick-time" hidden>
    <input type="file" id="photo" accept="image/*" hidden>
    <button class="icon-btn" id="btn-photo" title="Photo / screenshot">📷</button>
    <button class="icon-btn send" id="btn-send" title="Ajouter">➤</button>
  </div>
</div>

<dialog id="dlg">
  <h2>Connexion à l'API</h2>
  <label>URL de la Web App Apps Script (/exec)</label>
  <input id="cfg-url" placeholder="https://script.google.com/macros/s/…/exec">
  <label>Token (APP_TOKEN)</label>
  <input id="cfg-token" placeholder="ton token secret">
  <button class="save" id="cfg-save">Enregistrer</button>
</dialog>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const cfg = { url: localStorage.getItem('apiUrl') || '', token: localStorage.getItem('apiToken') || '' };
let selDate = '', selTime = '';

/* ---- Init ---- */
$('today').textContent = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
if (!cfg.url || !cfg.token) openSettings(); else loadTasks();

/* ---- API ---- */
async function api(body) {
  const res = await fetch(cfg.url, { method: 'POST', body: JSON.stringify({ token: cfg.token, ...body }) });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'ERREUR_API');
  return data;
}
async function loadTasks() {
  try {
    const res = await fetch(`${cfg.url}?token=${encodeURIComponent(cfg.token)}&mode=tasks`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    render(data.tasks);
  } catch (e) { toast('Connexion impossible — vérifie les réglages'); render([]); }
}

/* ---- Rendu ---- */
function render(tasks) {
  const todayISO = new Date().toLocaleDateString('sv-SE');
  const tomorrowISO = new Date(Date.now() + 864e5).toLocaleDateString('sv-SE');
  const groups = { late: [], today: [], tomorrow: [], soon: [], nodate: [] };
  tasks.sort((a, b) => (a.date || '9999') === (b.date || '9999') ? (a.heure || '').localeCompare(b.heure || '') : (a.date || '9999').localeCompare(b.date || '9999'));
  tasks.forEach(t => {
    if (!t.date) groups.nodate.push(t);
    else if (t.date < todayISO) groups.late.push(t);
    else if (t.date === todayISO) groups.today.push(t);
    else if (t.date === tomorrowISO) groups.tomorrow.push(t);
    else groups.soon.push(t);
  });
  const labels = { late: 'En retard', today: "Aujourd'hui", tomorrow: 'Demain', soon: 'À venir', nodate: 'Sans date' };
  let html = '';
  for (const k of Object.keys(groups)) {
    if (!groups[k].length) continue;
    html += `<div class="section-label ${k === 'late' ? 'late' : ''}">${labels[k]}</div>`;
    html += groups[k].map(t => `
      <div class="task" id="t-${t.id}">
        <button class="check" onclick="complete('${t.id}')" aria-label="Terminer"></button>
        <div class="task-body">
          <div class="task-title">${esc(t.titre)}</div>
          <div class="task-meta">
            <span class="dot ${t.source}"></span>
            ${t.date && k === 'soon' ? fmtDate(t.date) : ''} ${t.heure ? '· ' + t.heure : ''}
          </div>
          ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
        </div>
      </div>`).join('');
  }
  $('list').innerHTML = html || `<div class="empty"><div class="display">Rien à faire ✦</div>Capture une tâche ou envoie un screenshot.</div>`;
}
const esc = s => String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const fmtDate = d => new Date(d + 'T12:00').toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });

/* ---- Actions ---- */
async function complete(id) {
  const el = $('t-' + id); el.classList.add('done');
  try { await api({ action: 'completeTask', id }); setTimeout(() => el.remove(), 300); }
  catch (e) { el.classList.remove('done'); toast('Échec — réessaie'); }
}
window.complete = complete;

$('btn-send').onclick = async () => {
  const titre = $('titre').value.trim();
  if (!titre) return;
  $('btn-send').disabled = true;
  try {
    await api({ action: 'addTask', titre, date: selDate, heure: selTime });
    $('titre').value = ''; resetChips();
    toast(selDate ? 'Tâche + rappel Calendar créés' : 'Tâche ajoutée');
    loadTasks();
  } catch (e) { toast('Échec de l\'ajout'); }
  $('btn-send').disabled = false;
};
$('titre').addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-send').click(); });

/* ---- Chips date/heure ---- */
document.querySelectorAll('.chip[data-when]').forEach(c => c.onclick = () => {
  const on = !c.classList.contains('on');
  document.querySelectorAll('.chip[data-when]').forEach(x => x.classList.remove('on'));
  $('chip-date').classList.remove('on');
  if (on) {
    c.classList.add('on');
    selDate = new Date(Date.now() + (c.dataset.when === 'tomorrow' ? 864e5 : 0)).toLocaleDateString('sv-SE');
  } else selDate = '';
});
$('chip-date').onclick = () => $('pick-date').showPicker ? $('pick-date').showPicker() : $('pick-date').click();
$('pick-date').onchange = e => {
  document.querySelectorAll('.chip[data-when]').forEach(x => x.classList.remove('on'));
  selDate = e.target.value;
  $('chip-date').textContent = '📅 ' + fmtDate(selDate);
  $('chip-date').classList.add('on');
};
$('chip-time').onclick = () => $('pick-time').showPicker ? $('pick-time').showPicker() : $('pick-time').click();
$('pick-time').onchange = e => {
  selTime = e.target.value;
  $('chip-time').textContent = '🕐 ' + selTime;
  $('chip-time').classList.add('on');
};
function resetChips() {
  selDate = ''; selTime = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  $('chip-date').textContent = '📅 Date'; $('chip-time').textContent = '🕐 Heure';
}

/* ---- Photo ---- */
$('btn-photo').onclick = () => $('photo').click();
$('photo').onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;
  toast('Compression…');
  const base64 = await resize(file, 1400, 0.8);
  try {
    await api({ action: 'uploadPhoto', base64, filename: file.name, mimeType: 'image/jpeg' });
    toast('Photo envoyée — analyse en cours');
    api({ action: 'processNow' }).then(r => { if (r.traites) { toast(r.traites + ' tâche(s) extraite(s)'); loadTasks(); } });
  } catch (err) { toast('Échec de l\'envoi'); }
  e.target.value = '';
};
function resize(file, maxDim, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = img.width * scale; cv.height = img.height * scale;
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      resolve(cv.toDataURL('image/jpeg', quality).split(',')[1]);
    };
    img.src = URL.createObjectURL(file);
  });
}

/* ---- Réglages ---- */
function openSettings() {
  $('cfg-url').value = cfg.url; $('cfg-token').value = cfg.token;
  $('dlg').showModal();
}
$('settings').onclick = openSettings;
$('cfg-save').onclick = () => {
  cfg.url = $('cfg-url').value.trim(); cfg.token = $('cfg-token').value.trim();
  localStorage.setItem('apiUrl', cfg.url); localStorage.setItem('apiToken', cfg.token);
  $('dlg').close(); loadTasks();
};
$('refresh').onclick = loadTasks;

/* ---- Toast ---- */
let toastTimer;
function toast(msg) {
  $('toast').textContent = msg; $('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $('toast').classList.remove('show'), 2600);
}
</script>
</body>
</html>
